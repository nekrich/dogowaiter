name: publish

on:
  release:
    types: [published]
  workflow_call:
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          install: true

      - name: Set image tag
        id: tag
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Set build info
        id: build-info
        run: |
          IMAGE_CREATED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ' | tr -d '\n')"
          echo "IMAGE_CREATED_AT=${IMAGE_CREATED_AT}"
          echo "image_created_at=${IMAGE_CREATED_AT}" >> "$GITHUB_OUTPUT"

          GO_VERSION="$(mise env --json | jq -r '.GO_VERSION' | tr -d '[[:space:]]')"
          echo "GO_VERSION=${GO_VERSION}"
          echo "go_version=${GO_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: build/package/Dockerfile
          platforms: linux/amd64,linux/arm64/v8
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/dogowaiter:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/dogowaiter:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/dogowaiter:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/dogowaiter:latest
          build-args: |
            GO_VERSION=${{ steps.build-info.outputs.go_version }}
            IMAGE_VERSION=${{ steps.tag.outputs.tag }}
            IMAGE_REVISION=${{ github.sha }}
            IMAGE_CREATED_AT=${{ steps.build-info.outputs.image_created_at }}
            ALPINE_VERSION=latest
